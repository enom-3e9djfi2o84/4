    <h1>フランツ・シューベルト</h1>
    <p>シューベルトは、オーストリア・ウィーンで生まれた作曲家である。幼い頃から音楽の才能を発揮し、教会の聖歌隊や音楽学校で学びながら作曲を始めた。教師として働いた時期もあったが、作曲活動に専念し、多くの歌曲や交響曲、室内楽曲、ピアノ曲を残した。特に歌曲の分野で大きな功績を残し、「歌曲王」とも呼ばれている。しかし、生前は十分な評価や経済的成功を得ることができず、友人たちの支えを受けながら創作を続けた。31歳という若さで亡くなったが、死後に作品の価値が広く認められ、『魔王』『野ばら』『未完成交響曲』など数多くの名作は、現在でも世界中で親しまれている。</p>
